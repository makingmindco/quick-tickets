<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>QuickTickets - Primeiro Acesso</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f1f5f9; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Primeiro Acesso</h2>
        <p>Por segurança, você deve alterar sua senha provisória para continuar.</p>
        <input type="password" id="novaSenha" placeholder="Digite sua nova senha" required>
        <input type="password" id="confirmaSenha" placeholder="Confirme a nova senha" required>
        <button id="btnTrocar">Salvar Nova Senha</button>
    </div>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));

        document.getElementById('btnTrocar').addEventListener('click', async () => {
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmaSenha = document.getElementById('confirmaSenha').value;

            if (novaSenha !== confirmaSenha) return alert('As senhas não coincidem!');
            if (novaSenha.length < 4) return alert('A senha deve ser mais segura.');

            const resposta = await fetch('http://localhost:3000/api/auth/update-password', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario_id: usuarioLogado.id, novaSenha })
            });

            if (resposta.ok) {
                alert('Senha atualizada! Por favor, faça login novamente.');
                localStorage.removeItem('usuarioLogado');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
