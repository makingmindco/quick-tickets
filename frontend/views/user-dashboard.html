<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTickets - Meu Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Reset e Configurações Base */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; display: flex; height: 100vh; background-color: #f1f5f9; color: #334155; }
        
        /* Sidebar (Menu Lateral) */
        .sidebar { width: 260px; background-color: #1e293b; color: #f8fafc; padding: 24px; display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.05); z-index: 10; }
        .sidebar-header { margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .sidebar-header h2 { font-size: 20px; font-weight: 600; color: #38bdf8; }
        .sidebar-header p { font-size: 14px; color: #94a3b8; margin-top: 5px; }
        
        .menu-item { padding: 12px 16px; margin-bottom: 8px; cursor: pointer; color: #cbd5e1; text-decoration: none; display: block; border-radius: 6px; transition: all 0.2s ease; font-weight: 500; }
        .menu-item:hover, .menu-item.ativo { background-color: #334155; color: #fff; }
        .menu-sair { margin-top: auto; color: #f87171; border: 1px solid transparent; }
        .menu-sair:hover { background-color: #fef2f2; color: #ef4444; border-color: #fca5a5; }

        /* Área Central */
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        
        /* Botão Principal */
        .btn-central { background-color: #2563eb; color: white; border: none; padding: 16px 32px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; margin-bottom: 40px; transition: background-color 0.2s, transform 0.1s; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        .btn-central:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        .btn-central:active { transform: translateY(1px); }
        
        /* Formulário de Chamado (Card) */
        .formulario-chamado { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -4px rgba(0,0,0,0.05); width: 100%; max-width: 550px; display: none; /* Escondido por padrão */ animation: fadeIn 0.3s ease; }
        .formulario-chamado.ativo { display: block; }
        .formulario-chamado h2 { margin-bottom: 24px; font-size: 22px; color: #0f172a; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #475569; }
        select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; font-size: 15px; transition: border-color 0.2s; background-color: #f8fafc; }
        select:focus, textarea:focus { outline: none; border-color: #38bdf8; background-color: #fff; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1); }
        
        .btn-enviar { background-color: #10b981; color: white; border: none; padding: 14px 24px; font-size: 16px; font-weight: 600; border-radius: 6px; cursor: pointer; width: 100%; transition: background-color 0.2s; }
        .btn-enviar:hover { background-color: #059669; }
        
        /* Feedback de Sucesso */
        .alerta-sucesso { background-color: #d1fae5; color: #065f46; padding: 12px; border-radius: 6px; text-align: center; font-weight: 500; margin-top: 20px; display: none; border: 1px solid #a7f3d0; }

        /* Animação suave para o formulário aparecer */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Área de Tickets (Para o futuro) */
        .area-tickets { width: 100%; max-width: 900px; margin-top: 20px; display: none; }
        .area-tickets h2 { margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>QuickTickets</h2>
            <p id="nomeUsuario">Carregando usuário...</p>
        </div>
        <a href="#" class="menu-item ativo" id="btnNovoChamadoMenu">Novo Chamado</a>
        <a href="#" class="menu-item" id="btnMeusTickets">Meus Tickets</a>
        <a href="#" class="menu-item" id="btnComunidade">Mural da Comunidade</a>
        <a href="#" class="menu-item menu-sair" id="btnSair">Sair da Conta</a>
    </div>

    <div class="main-content">
        
        <button class="btn-central" id="btnAbrirChamado">Abrir Novo Chamado</button>

        <div class="formulario-chamado" id="caixaFormulario">
            <h2>Descreva sua solicitação</h2>
            <form id="formTicket">
                <div class="input-group">
                    <label for="categoriaTicket">Qual o tipo do problema?</label>
                    <select id="categoriaTicket" required>
                        <option value="" disabled selected>Selecione uma opção...</option>
                        <option value="1">Preciso de ajuda</option>
                        <option value="2">Equipamento quebrado</option>
                        <option value="3">Identifiquei um problema</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="descricaoTicket">Detalhes da situação</label>
                    <textarea id="descricaoTicket" rows="5" placeholder="Explique o que está acontecendo..." required></textarea>
                </div>
                
                <button type="submit" class="btn-enviar">Enviar Solicitação</button>
            </form>
            <div id="mensagemSucesso" class="alerta-sucesso">Ticket aberto com sucesso! Nossa equipe já foi notificada.</div>
        </div>

        <div class="area-tickets" id="areaTickets">
            <h2>Meus Chamados Recentes</h2>
            <div id="listaTickets">
                </div>
        </div>

    </div>
    <script src="dashboard.js"></script>
    </body>
</html>
