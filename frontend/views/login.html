<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTickets - Acesso</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .login-box { background: #fff; padding: 30px 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        h2 { margin-top: 0; color: #333; }
        input { display: block; width: 100%; margin: 10px 0 20px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        p { margin-top: 20px; font-size: 14px; color: #666; }
        a { color: #007bff; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-box" id="boxLogin">
        <h2>Entrar no QuickTickets</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Seu e-mail" required>
            <input type="password" id="senha" placeholder="Sua senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p>Não tem uma conta? <a href="#" id="linkIrParaCadastro">Cadastre-se</a></p>
    </div>

    <div class="login-box" id="boxCadastro" style="display: none;">
        <h2>Criar Conta</h2>
        <form id="cadastroForm">
            <input type="text" id="nomeCadastro" placeholder="Nome completo" required>
            <input type="email" id="emailCadastro" placeholder="Seu e-mail corporativo" required>
            <input type="password" id="senhaCadastro" placeholder="Crie uma senha" required>
            <button type="submit" style="background-color: #28a745;">Cadastrar</button>
        </form>
        <p>Já tem uma conta? <a href="#" id="linkIrParaLogin">Faça Login</a></p>
    </div>

    <script src="auth.js"></script>
</body>
</html>
